    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .navbar {
            background: #2c3e50;
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            overflow-x: auto;
        }
        .navbar::-webkit-scrollbar { display: none; }
        .navbar .brand { font-size: 16px; font-weight: 600; }
        .navbar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .navbar a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 1em; color: rgba(255,255,255,0.7); }
        
        .diary-section { max-width: 700px; margin: 0 auto; padding: 0 20px 40px; }
        .diary-section h2 { font-size: 1.3em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        
        .diary-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .diary-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }
        .diary-card a { color: #fff; text-decoration: none; display: block; }
        .diary-card .date { color: #667eea; font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .diary-card .title { font-size: 1em; margin-bottom: 4px; }
        .diary-card .desc { color: rgba(255,255,255,0.6); font-size: 13px; }
        
        .more-link { text-align: center; margin-top: 20px; }
        .more-link a {
            color: #667eea;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #667eea;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }
        
        .footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); font-size: 12px; }
        
        @media (max-width: 480px) {
            .hero { padding: 40px 15px; }
            .hero h1 { font-size: 1.8em; }
            .diary-section { padding: 0 15px 30px; }

</head>
